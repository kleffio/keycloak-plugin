name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: idp-keycloak

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: idp-keycloak/go.mod
          cache-dependency-path: idp-keycloak/go.sum

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: CGO_ENABLED=0 go build ./...

      - name: Test
        run: go test ./...

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: idp-keycloak
          push: false
